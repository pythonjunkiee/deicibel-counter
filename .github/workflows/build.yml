name: Build

# Runs on every push to main and on version tags (v1.0.0, etc.)
# Produces direct-download files — no store accounts, no signing required.
on:
  push:
    branches: [main]
    tags:     ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Windows (.exe installer) ─────────────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: npm ci

      - name: Build
        run: npm run tauri build
        # No signing env-vars → unsigned installer.
        # Windows Defender will show "Unknown publisher" — user clicks
        # "More info → Run anyway". That's it. No account needed.

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          # NSIS produces a single-file setup.exe — the easiest for end-users.
          path: src-tauri/target/release/bundle/nsis/*.exe

  # ── macOS (.dmg — Intel + Apple Silicon) ────────────────────────
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          # Both targets = universal binary (runs natively on Intel and M-series)
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: npm ci

      - name: Build
        run: npm run tauri build -- --target universal-apple-darwin
        # No APPLE_* env-vars → unsigned .dmg.
        # On the user's Mac: right-click the .app → Open → Open anyway (once).
        # Gatekeeper remembers the decision — no prompt after that.

      - name: Upload macOS dmg
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

  # ── Android (APK — direct sideload, no Play Store) ──────────────
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;26.1.10909125"

      - run: npm ci

      - name: Init Android project (first time only — idempotent)
        run: npm run tauri android init
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125

      - name: Patch AndroidManifest — microphone permission
        # Injects RECORD_AUDIO before </manifest> if not already present.
        run: |
          MANIFEST="src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          if ! grep -q "RECORD_AUDIO" "$MANIFEST"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />\n    <uses-feature android:name="android.hardware.microphone" android:required="true" />\n</manifest>|' "$MANIFEST"
          fi

      - name: Build APK (debug — no keystore needed)
        run: npm run tauri android build -- --debug
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          # User downloads this .apk, taps it on their Android phone,
          # enables "Install unknown apps" once in Settings, done.
          path: src-tauri/gen/android/app/build/outputs/apk/debug/*.apk

  # ── GitHub Release — attach all artifacts when a tag is pushed ──
  release:
    needs: [windows, macos, android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name:     "dB Meter ${{ github.ref_name }}"
          draft:    false
          generate_release_notes: true
          files: |
            artifacts/windows-installer/*.exe
            artifacts/macos-dmg/*.dmg
            artifacts/android-apk/*.apk
